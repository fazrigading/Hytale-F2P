# These settings are synced to GitHub by https://probot.github.io/apps/settings/
repository:
  # The name of the repository
  name: Hytale-F2P
  # Description from package.json
  description: A modern, cross-platform launcher for Hytale with automatic updates and multi-client support
  # Homepage from package.json
  homepage: https://github.com/amiayweb/Hytale-F2P
  # Topics based on keywords
  topics: hytale, launcher, game, client, cross-platform, windows, macos, mac, linux, games, electron, auto-update, mod-manager
  # Public repo
  private: false
  # Enable issues for bug reports
  has_issues: true
  # Enable projects for organization
  has_projects: true
  # Enable wiki for documentation
  has_wiki: true
  # Enable downloads (for releases)
  has_downloads: true
  # Default branch
  default_branch: main
  # Allow squash merge (common for clean history)
  allow_squash_merge: true
  # Allow merge commit
  allow_merge_commit: true
  # Allow rebase merge
  allow_rebase_merge: true
  # Delete branches on merge
  delete_branch_on_merge: false
  # Enable automated security fixes
  enable_automated_security_fixes: true
  # Enable vulnerability alerts
  enable_vulnerability_alerts: true

# Labels for issues and PRs
labels:
  - name: bug
    color: CC0000
    description: An issue with the system 🐛
  - name: feature
    color: 336699
    description: New functionality ✨
  - name: enhancement
    color: 84cc16
    description: Enhancement to existing functionality ⚡
  - name: documentation
    color: 0075ca
    description: Documentation updates 📚
  - name: help wanted
    color: 128A0C
    description: Extra attention is needed 🙋
  - name: question
    color: D876E3
    description: Further information is requested ❓
  - name: discussion
    color: 5319E7
    description: Open for discussion 💬
  - name: wontfix
    color: 8B8B8B
    description: This will not be worked on ❌
  - name: invalid
    color: E4E669
    description: This doesn't seem right ⚠️
  - name: duplicate
    color: C0C0C0
    description: This issue or PR already exists 🔁
  - name: support
    color: 0E8A16
    description: Support request 🆘
  - name: priority
    color: FFFFFF
    description: Priority level for issues and PRs 🏷
  - name: priority/critical
    color: CC0000
    description: Critical priority - must be addressed immediately 🔴
  - name: priority/high
    color: FF6B35
    description: High priority - address soon 🟠
  - name: priority/medium
    color: FFD93D
    description: Medium priority - normal workflow 🟡
  - name: priority/low
    color: 6BCF7F
    description: Low priority - can be deferred 🟢

# Branch protection for main
branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
        dismissal_restrictions: {}
      required_status_checks:
        strict: true
        contexts: []
      enforce_admins: true
      required_linear_history: false
      restrictions: {}